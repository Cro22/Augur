# Augur — pricing snapshot
#
# Prices are USD per 1,000,000 tokens (per Mtok).
# This is a DATED SNAPSHOT, copied by hand from provider pricing pages.
# Provider prices drift constantly — do not assume this is current. See README.
#
# Semantics of the three fields (per model):
#   input         USD/Mtok for non-cached prompt (input) tokens
#   output        USD/Mtok for completion (output) tokens
#   cached_input  USD/Mtok for prompt tokens served from the provider's cache
#                 (a discounted subset of input). Omit if the model has no
#                 cache discount — Augur then bills cached tokens at `input`.

version: 1
snapshot_date: "2026-06-21"
currency: USD
unit: per_mtok

models:
  # --- OpenAI ---
  gpt-4o:
    input: 2.50
    output: 10.00
    cached_input: 1.25
  gpt-4o-mini:
    input: 0.15
    output: 0.60
    cached_input: 0.075
  o3-mini:
    input: 1.10
    output: 4.40
    cached_input: 0.55

  # --- Anthropic ---
  claude-opus-4-8:
    input: 15.00
    output: 75.00
    cached_input: 1.50
  claude-sonnet-4-6:
    input: 3.00
    output: 15.00
    cached_input: 0.30
  claude-haiku-4-5:
    input: 1.00
    output: 5.00
    cached_input: 0.10
